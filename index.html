<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dusk till Dawn Station</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="synth-background">
        <div class="tv-container">
            <div class="tv-frame" id="main-tv-frame">
                <div class="screen-area">
                    <div id="video-container">
                        <video id="broadcast-video" preload="auto" playsinline></video>
                    </div>
                    
                    <!-- Unified Interaction Overlay (Play/Unmute/Sync) -->
                    <div id="interaction-overlay" class="hidden">
                        <div class="overlay-content">
                            <div class="play-icon">
                                <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                            </div>
                            <div class="overlay-text">TUNE IN</div>
                        </div>
                    </div>

                    <!-- New Bumper Overlay -->
                    <div id="bumper-overlay" class="hidden">
                        <div class="bumper-content">
                            <div class="bumper-tag">COMING UP</div>
                            <div id="next-title" class="title">NEXT TITLE</div>
                            <div class="bumper-tag secondary">FOLLOWED BY</div>
                            <div id="after-title" class="title small">AFTER TITLE</div>
                        </div>
                    </div>

                    <div id="off-air" class="hidden">
                        <div class="test-card">
                            <div class="smpte-bars"></div>
                            <div class="off-air-text">
                                <h1>STATION CLOSED</h1>
                                <p>RETURN AT DUSK (6:00 PM)</p>
                            </div>
                        </div>
                        <div class="static-overlay"></div>
                    </div>
                    <div class="scanlines"></div>
                    <button id="fullscreen-btn" title="Toggle Fullscreen">
                        <svg viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
                    </button>
                </div>
                <div class="controls">
                    <div class="power-panel">
                        <div id="power-led" class="led"></div>
                        <span class="label">POWER</span>
                    </div>
                    <div class="dials">
                        <div class="dial dial-big"></div>
                        <div class="dial dial-small"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
